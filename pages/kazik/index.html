<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>kazik</title>
  <style>
    body,
    html {
      height: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #111;
      color: #fff;
      font-family: sans-serif;
      user-select: none;
    }

    .video-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    video {
      width: 200px;
      height: auto;
      border: 2px solid #fff;
      border-radius: 8px;
      background-color: black;
    }

    .message {
      font-size: 18px;
      text-align: center;
      margin-top: 20px;
    }

    /* Красная верхняя моргающая надпись */
    .top-message {
      color: red;
      font-weight: bold;
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow:
        0 0 5px #ff0000,
        0 0 10px #ff3333,
        0 0 20px #ff6666,
        0 0 40px #ff9999;
      animation: blink-pulse 1s infinite, shake 0.5s infinite;
      display: inline-block;
    }

    #melstroy-gif {
      position: fixed;
      bottom: 130px;
      right: 10px;
      width: 180px;
      height: auto;
      z-index: 9999;
      pointer-events: none;
    }

    #xbet-logo {
      position: fixed;
      bottom: 130px;
      left: 10px;
      width: 150px;
      height: auto;
      z-index: 9999;
      pointer-events: none;
      animation: xbet-blink 1s infinite, xbet-pulse 1s infinite, xbet-swing 2s infinite ease-in-out;
    }

    /* Моргаем */
    @keyframes xbet-blink {

      0%,
      50%,
      100% {
        opacity: 1;
      }

      25%,
      75% {
        opacity: 0.4;
      }
    }

    /* Пульсируем */
    @keyframes xbet-pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    @keyframes blink-pulse {

      0%,
      50%,
      100% {
        opacity: 1;
        transform: scale(1);
        text-shadow:
          0 0 5px #ff0000,
          0 0 10px #ff3333,
          0 0 20px #ff6666,
          0 0 40px #ff9999;
      }

      25%,
      75% {
        opacity: 0.7;
        transform: scale(1.1);
        text-shadow:
          0 0 10px #ff0000,
          0 0 20px #ff3333,
          0 0 30px #ff6666,
          0 0 60px #ff9999;
      }
    }

    @keyframes xbet-swing {
      0% {
        transform: rotate(-20deg) scale(1);
      }

      50% {
        transform: rotate(20deg) scale(1.05);
      }

      100% {
        transform: rotate(-20deg) scale(1);
      }
    }

    .crazy-message {
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      text-align: center;
      animation: crazy-blink 1s infinite, crazy-pulse 1s infinite, crazy-shake 0.5s infinite, crazy-rainbow 3s linear infinite;
      display: inline-block;
      margin-top: 10px;
    }

    /* Моргаем */
    @keyframes crazy-blink {

      0%,
      50%,
      100% {
        opacity: 1;
      }

      25%,
      75% {
        opacity: 0.4;
      }
    }

    /* Пульсация */
    @keyframes crazy-pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    /* Тряска */
    @keyframes crazy-shake {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(-4px, 2px);
      }

      50% {
        transform: translate(4px, -2px);
      }

      75% {
        transform: translate(-2px, 1px);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    /* Радуга-перелив */
    @keyframes crazy-rainbow {
      0% {
        color: red;
      }

      14% {
        color: orange;
      }

      28% {
        color: yellow;
      }

      42% {
        color: green;
      }

      57% {
        color: cyan;
      }

      71% {
        color: blue;
      }

      85% {
        color: violet;
      }

      100% {
        color: red;
      }
    }

    @keyframes shake {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(-3px, 2px);
      }

      50% {
        transform: translate(3px, -2px);
      }

      75% {
        transform: translate(-2px, 1px);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    /* Радуга-анимация текста */
    @keyframes rainbow {
      0% {
        color: red;
      }

      14% {
        color: orange;
      }

      28% {
        color: yellow;
      }

      42% {
        color: green;
      }

      57% {
        color: cyan;
      }

      71% {
        color: blue;
      }

      85% {
        color: violet;
      }

      100% {
        color: red;
      }
    }

    .rainbow-text {
      animation: rainbow 2s linear infinite;
      font-size: 22px;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .blinking-emoji {
      animation: blink 0.5s step-start infinite;
    }

    @keyframes blink {

      0%,
      50%,
      100% {
        opacity: 1;
      }

      25%,
      75% {
        opacity: 0;
      }
    }

    /* Зеленая JACKPOT надпись */
    .jackpot {
      color: limegreen;
      font-weight: bold;
      font-size: 80px;
      text-transform: uppercase;
      text-shadow:
        0 0 10px #00ff00,
        0 0 20px #00ff88,
        0 0 30px #00ffaa,
        0 0 40px #00ffcc;
      animation: jackpot-blink 1s infinite, jackpot-pulse 1s infinite;
      display: inline-block;
      margin-top: 10px;
    }

    @keyframes jackpot-blink {

      0%,
      50%,
      100% {
        opacity: 1;
      }

      25%,
      75% {
        opacity: 0.5;
      }
    }

    @keyframes jackpot-pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }
    }

    /* Бегущая цифра */
    .jackpot-number {
      font-size: 35px;
      font-weight: bold;
      color: yellow;
      text-shadow:
        0 0 5px #ffff00,
        0 0 10px #ffdd00,
        0 0 20px #ffaa00;
      animation: number-blink 0.5s infinite;
      margin-top: 5px;
    }

    @keyframes number-blink {

      0%,
      50%,
      100% {
        opacity: 1;
      }

      25%,
      75% {
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>

  <!-- Верхняя красная моргающая надпись -->
  <div class="message top-message" id="top-message">PRESS BIG ENTER BUTTON TO WIN</div>

  <!-- Зеленый JACKPOT и цифра -->
  <div class="message" id="jackpot-container" style="display:flex; flex-direction:column; align-items:center;">
    <div class="jackpot" id="jackpot-text">JACKPOT</div>
    <div class="jackpot-number" id="jackpot-number">2384387539</div>
  </div>

  <div class="video-container">
    <video id="vid1" src="slots.mp4" muted></video>
    <video id="vid2" src="slots.mp4" muted></video>
    <video id="vid3" src="slots.mp4" muted></video>
  </div>

  <!-- Радужная надпись с эмодзи -->
  <div class="message" id="bottom-message"></div>

  <!-- Красная моргающая надпись под радужной -->
  <div class="message top-message" id="second-message" style="display:none;">
    SELL YOUR KIDS AND SPIN AGAIN
  </div>

  <script>
    const videos = [
      document.getElementById('vid1'),
      document.getElementById('vid2'),
      document.getElementById('vid3')
    ];

    const topMessage = document.getElementById('top-message');
    const bottomMessage = document.getElementById('bottom-message');
    const secondMessage = document.getElementById('second-message');
    const jackpotNumber = document.getElementById('jackpot-number');

    let gamblingInProgress = false;
    let jackpotValue = 4323487539;


    // Функция для бесконечного увеличения числа
    function updateJackpot() {
      jackpotValue += 45238; // увеличиваем на 45238 за кадр
      jackpotNumber.textContent = "$ " + jackpotValue.toLocaleString() + " $";

      requestAnimationFrame(updateJackpot);
    }
    updateJackpot(); // стартуем сразу

    function getRandomDuration() {
      return (Math.random() * 6 + 3) * 1000; // 3-9 секунд
    }

    function startGambling() {
      if (gamblingInProgress) return;
      gamblingInProgress = true;

      topMessage.style.display = 'none';
      bottomMessage.textContent = 'GAMBLING PROCESS IS PROCESSING...';
      bottomMessage.classList.add('crazy-message');

      secondMessage.style.display = 'none';

      let stoppedCount = 0;

      videos.forEach(video => {
        video.play();
        const duration = getRandomDuration();

        setTimeout(() => {
          video.pause(); // останавливаем на текущем кадре
          stoppedCount++;

          if (stoppedCount === videos.length) {
            // показываем радужную надпись с эмодзи
            bottomMessage.innerHTML = `
          <span class="rainbow-text">
            <span class="blinking-emoji">💥</span>
            CONGRATULATIONS!!!!!! U BROKE NOW
            <span class="blinking-emoji">💥</span>
          </span>
        `;

            // показываем красную моргающую надпись под радужной
            secondMessage.style.display = 'block';

            gamblingInProgress = false;
          }
        }, duration);
      });
    }


    window.addEventListener('message', function (event) {
      if (event.data.type === 'ENTER_PRESSED') {
        startGambling()
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Enter') {
        startGambling();
      }
    });

  </script>
  <img src="melstroy.gif" id="melstroy-gif" alt="melstroy">
  <img src="1xbet.png" id="xbet-logo" alt="1XBET">
</body>

</html>
